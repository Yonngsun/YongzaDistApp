name: Keep Streamlit App Awake

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping Streamlit app
        env:
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "APP_URL secret is not set. Add it in: Settings > Secrets and variables > Actions"
            exit 1
          fi

          echo "Pinging $APP_URL"
          HTTP_CODE=$(curl -L -sS -o /dev/null -w "%{http_code}" --max-time 30 "$APP_URL")
          echo "HTTP status: $HTTP_CODE"

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 400 ]; then
            echo "Ping failed with status $HTTP_CODE"
            exit 1
          fi
